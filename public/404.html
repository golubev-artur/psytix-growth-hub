<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, follow" />
    <title>Страница не найдена — Psytix</title>
    <script>
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?p=/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
    <style>
      body { margin: 0; background: #0a0a1a; color: #e2e8f0; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
      h1 { font-size: 2rem; margin-bottom: 0.5rem; }
      p { color: #94a3b8; margin-bottom: 1.5rem; }
      a { color: #7c5cfc; text-decoration: none; }
    </style>
  </head>
  <body>
    <div>
      <h1>404 — Страница не найдена</h1>
      <p>Такой страницы не существует или она была перемещена.</p>
      <a href="/">Вернуться на главную</a>
    </div>
  </body>
</html>
